---
- name: Prepare K3s Node (OS Base)
  hosts: k3s_cluster
  become: true
  tags:
    - init
  roles:
    # ssh keys added through tofu
    - name: devsec.hardening.ssh_hardening
      vars:
        ssh_allow_tcp_forwarding: "yes"

- name: Install Packages
  hosts: k3s_cluster
  become: true
  tags:
    - init
    - packages
  tasks:
    - name: Install longhorn packages
      ansible.builtin.package:
        name:
          - open-iscsi
          - nfs-common
        state: present

- name: Deploy K3s via Official Collection
  tags:
    - k3s
    - init
  ansible.builtin.import_playbook: k3s.orchestration.site

- name: Setup local environment with k3s config
  hosts: k3s-server-01
  tags:
    - init
    - kubeconfig
  tasks:
    - name: Fetch K3s kubeconfig to local machine
      become: true
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/config
        flat: true

    - name: Update kubeconfig to point to the k3s server ip
      delegate_to: localhost
      ansible.builtin.replace:
        path: ~/.kube/config
        regexp: "127\\.0\\.0\\.1"
        replace: "{{ ansible_host }}"
