apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actual-budget
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jeottesen/server-config.git'
    path: k8s-cluster/apps/actual-budget
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: actual-budget
  syncPolicy:
    automated:
      prune: false
      selfHeal: false 
    syncOptions:
      - CreateNamespace=true