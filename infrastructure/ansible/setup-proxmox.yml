---
- name: Apply standard config
  hosts: hypervisors
  become: true
  tags: common-config
  tasks:
    - name: Create user {{ primary_user }}
      ansible.builtin.user:
        name: "{{ primary_user }}"
        password: "{{ primary_user_pass_encoded }}"
        uid: "{{ primary_user_puid }}"
        shell: /bin/bash
        state: present
      tags: create-user

# Run the community setup script for fresh proxmox installs
# https://community-scripts.org/scripts/post-pve-install?id=post-pve-install

- name: Run common roles
  hosts: hypervisors
  become: true
  tags:
    - common-config
    - init
  roles:
    - role: common/debian-sudo # noqa: role-name[path]
    - role: common/add-ssh-keys # noqa: role-name[path]
      become: true
      tags: ssh
    - role: devsec.hardening.ssh_hardening
      vars:
        ssh_allow_tcp_forwarding: "yes"
        # ssh_server_password_login: true
        # sshd_authenticationmethods: publickey password
      tags: ssh
    - role: common/update-all-packages # noqa: role-name[path]
      tags: packages
    - role: grog.package
      tags: packages

- name: Provision OpenTofu Service Account
  hosts: hypervisors
  become: true
  roles:
    - role: proxmox/tofu-setup # noqa: role-name[path]
      tags: tofu-setup
