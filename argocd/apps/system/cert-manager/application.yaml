apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: 'https://charts.jetstack.io'
    targetRevision: 1.7.2
    chart: cert-manager
    helm:
      valueFiles:
        - values.yaml
  destination:
    name: in-cluster
    namespace: cert-manager
  syncPolicy:
    syncOptions:
          - CreateNamespace=true