apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-infra
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: 'https://github.com/jeottesen/server-config.git'
    path: infrastructure/system/cert-manager-infra
    targetRevision: HEAD
  destination:
    name: in-cluster
    namespace: cert-manager