apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jeottesen/server-config.git'
    path: k8s-apps/whoami
    targetRevision: HEAD
  destination:
    name: in-cluster
    namespace: traefik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true