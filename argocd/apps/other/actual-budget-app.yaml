apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actual-budget
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jeottesen/server-config.git'
    path: infrastructure/apps/actual-budget
    targetRevision: HEAD
  destination:
    name: in-cluster
    namespace: actual-budget
  syncPolicy:
    syncOptions:
          - CreateNamespace=true