apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jeottesen/server-config.git'
    path: argocd/apps
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    name: in-cluster
    server: ''
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true